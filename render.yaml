services:
  - type: web
    name: quickeee-stylist
    runtime: python
    buildCommand: pip install -r render_requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODE
        value: onnx
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: PYTHONUNBUFFERED
        value: "1"
